<svg width="1400" height="800" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>
  <text x="700" y="70" font-family="Arial" font-size="40" font-weight="bold" text-anchor="middle">Agent-assisted Engineering Research Workflow</text>
  <style>.box{fill:#f5f5f5;stroke:#333;stroke-width:3}.t{font:700 24px Arial}.s{font:18px Arial;fill:#555}.a{stroke:#555;stroke-width:3;marker-end:url(#m)}</style>
  <defs><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#555"/></marker></defs>
  <g transform="translate(160,170)"><rect class="box" rx="18" width="300" height="90"/><text class="t" x="150" y="35" text-anchor="middle">Research Goal</text><text class="s" x="150" y="65" text-anchor="middle">Define modelling objective</text></g>
  <g transform="translate(520,170)"><rect class="box" rx="18" width="300" height="90"/><text class="t" x="150" y="35" text-anchor="middle">Task Decomposition</text><text class="s" x="150" y="65" text-anchor="middle">Break problem into actions</text></g>
  <g transform="translate(880,170)"><rect class="box" rx="18" width="300" height="90"/><text class="t" x="150" y="35" text-anchor="middle">Model / Data Coordination</text><text class="s" x="150" y="65" text-anchor="middle">Organize assumptions and outputs</text></g>
  <g transform="translate(520,350)"><rect class="box" rx="18" width="300" height="90"/><text class="t" x="150" y="35" text-anchor="middle">Computation &amp; Figures</text><text class="s" x="150" y="65" text-anchor="middle">Prepare visual result summaries</text></g>
  <g transform="translate(160,530)"><rect class="box" rx="18" width="300" height="90"/><text class="t" x="150" y="35" text-anchor="middle">Manuscript Update</text><text class="s" x="150" y="65" text-anchor="middle">Convert results into writing</text></g>
  <g transform="translate(520,530)"><rect class="box" rx="18" width="300" height="90"/><text class="t" x="150" y="35" text-anchor="middle">Consistency Check</text><text class="s" x="150" y="65" text-anchor="middle">Review text and assumptions</text></g>
  <g transform="translate(880,530)"><rect class="box" rx="18" width="300" height="90"/><text class="t" x="150" y="35" text-anchor="middle">Public-safe Log</text><text class="s" x="150" y="65" text-anchor="middle">Remove sensitive details</text></g>
  <line class="a" x1="460" y1="215" x2="520" y2="215"/><line class="a" x1="820" y1="215" x2="880" y2="215"/><line class="a" x1="1030" y1="260" x2="820" y2="395"/><line class="a" x1="520" y1="395" x2="460" y2="575"/><line class="a" x1="460" y1="575" x2="520" y2="575"/><line class="a" x1="820" y1="575" x2="880" y2="575"/>
</svg>
